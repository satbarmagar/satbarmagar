<svg width="100%" viewBox="0 0 1200 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Satbar Bura — Automate the boring. Build what scales.</title>
  <desc>GitHub profile banner for Satbar Bura, Automation and ERP Solutions specialist based in Sydney, Australia</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="glow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="40%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="#0a0a0a"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <rect width="1200" height="280" fill="url(#glow)"/>
  <rect width="1200" height="280" fill="url(#fadeL)"/>
  <rect width="1200" height="280" fill="url(#fadeR)"/>

  <!-- Corner brackets -->
  <path d="M 50 35 L 50 62 M 50 35 L 77 35" fill="none" stroke="#ff6600" stroke-width="1.8" stroke-opacity="0.65" stroke-linecap="round"/>
  <path d="M 1150 35 L 1150 62 M 1150 35 L 1123 35" fill="none" stroke="#ff6600" stroke-width="1.8" stroke-opacity="0.65" stroke-linecap="round"/>
  <path d="M 50 245 L 50 218 M 50 245 L 77 245" fill="none" stroke="#ff6600" stroke-width="1.8" stroke-opacity="0.65" stroke-linecap="round"/>
  <path d="M 1150 245 L 1150 218 M 1150 245 L 1123 245" fill="none" stroke="#ff6600" stroke-width="1.8" stroke-opacity="0.65" stroke-linecap="round"/>

  <!-- Status pill -->
  <rect x="80" y="52" width="176" height="24" rx="12" fill="rgba(255,102,0,0.1)" stroke="rgba(255,102,0,0.35)" stroke-width="0.8"/>
  <circle cx="98" cy="64" r="4" fill="#22c55e"/>
  <text x="110" y="69" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" letter-spacing="0.07em"><tspan fill="#22c55e">AVAILABLE</tspan><tspan fill="#ff8c33"> · SYD AU</tspan></text>

  <!-- Name -->
  <text x="80" y="138" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-0.03em">Satbar Bura</text>

  <!-- Orange underline -->
  <rect x="80" y="148" width="340" height="2" rx="1" fill="url(#lineGrad)"/>

  <!-- Tagline -->
  <text x="80" y="182" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="0.01em">Automate the boring. Build what scales.</text>

  <!-- Skill chips -->
  <rect x="80" y="208" width="56" height="22" rx="5" fill="rgba(255,102,0,0.1)" stroke="rgba(255,102,0,0.3)" stroke-width="0.7"/>
  <text x="108" y="223" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ff8c33" text-anchor="middle">n8n</text>

  <rect x="146" y="208" width="68" height="22" rx="5" fill="rgba(255,102,0,0.1)" stroke="rgba(255,102,0,0.3)" stroke-width="0.7"/>
  <text x="180" y="223" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ff8c33" text-anchor="middle">Shopify</text>

  <rect x="224" y="208" width="56" height="22" rx="5" fill="rgba(255,102,0,0.1)" stroke="rgba(255,102,0,0.3)" stroke-width="0.7"/>
  <text x="252" y="223" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ff8c33" text-anchor="middle">Odoo</text>

  <rect x="290" y="208" width="64" height="22" rx="5" fill="rgba(255,102,0,0.1)" stroke="rgba(255,102,0,0.3)" stroke-width="0.7"/>
  <text x="322" y="223" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ff8c33" text-anchor="middle">Python</text>

  <rect x="364" y="208" width="80" height="22" rx="5" fill="rgba(255,102,0,0.1)" stroke="rgba(255,102,0,0.3)" stroke-width="0.7"/>
  <text x="404" y="223" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ff8c33" text-anchor="middle">REST APIs</text>

  <!-- Stats block - stacked: 1 top, 2 bottom -->

  <!-- Top: 25+ Integrations Built (full width) -->
  <rect x="652" y="50" width="438" height="84" rx="8" fill="rgba(18,18,18,0.92)" stroke="rgba(255,102,0,0.28)" stroke-width="0.9"/>
  <text x="871" y="104" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">25<tspan fill="#ff6600">+</tspan></text>
  <text x="871" y="124" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" font-weight="400" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="0.12em">INTEGRATIONS BUILT</text>

  <!-- Bottom row: 40+ Workflows | 1,000+ Hours Saved -->
  <rect x="652" y="144" width="212" height="84" rx="8" fill="rgba(18,18,18,0.92)" stroke="rgba(255,102,0,0.28)" stroke-width="0.9"/>
  <text x="758" y="196" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">40<tspan fill="#ff6600">+</tspan></text>
  <text x="758" y="216" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" font-weight="400" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="0.12em">WORKFLOWS SHIPPED</text>

  <rect x="872" y="144" width="218" height="84" rx="8" fill="rgba(18,18,18,0.92)" stroke="rgba(255,102,0,0.28)" stroke-width="0.9"/>
  <text x="981" y="196" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">1,000<tspan fill="#ff6600">+</tspan></text>
  <text x="981" y="216" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" font-weight="400" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="0.12em">HOURS SAVED</text>
</svg>
